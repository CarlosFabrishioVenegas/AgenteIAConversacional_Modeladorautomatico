active_model: "random_forest"   # random_forest | gradient_boosting | extra_trees | logistic_regression | sgd

threshold_strategy: "recall"   # recall | f1 | precision | fixed
fixed_threshold: 0.5           # solo si threshold_strategy = fixed

models:
  logistic_regression:
    max_iter: 1000
    C: 1.0
    solver: "lbfgs"

  random_forest:
    n_estimators: 300
    max_depth: 12
    min_samples_leaf: 10
    n_jobs: -1

  extra_trees:
    n_estimators: 300
    max_depth: 12
    n_jobs: -1

  gradient_boosting:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 3

smote:
  enabled: true
  random_state: 42

shap:
  enabled: true
  sample_size: 500
